<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor — NeonLatino</title>
  <meta name="description" content="Reproductor de NeonLatino">
  <meta name="theme-color" content="#06060c">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    /* Specific styles for Watch page */
    .watch-container {
      padding: calc(var(--nav-height) + 2rem) var(--content-padding) 4rem;
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
    }

    @media (max-width: 768px) {
      .watch-container {
        padding-top: calc(var(--nav-height) + 1rem);
        padding-bottom: 2rem;
      }
      .player-wrapper {
        margin-bottom: 1.5rem;
        border-inline: none;
      }
    }
    
    .player-wrapper {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-elevated);
      border: 1px solid rgba(var(--neon-cyan-rgb), 0.2);
      box-shadow: 0 0 30px rgba(var(--neon-cyan-rgb), 0.1);
      position: relative;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    
    .player-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    .player-wrapper iframe.loaded {
      opacity: 1;
    }

    .player-placeholder {
      position: absolute;
      inset: 0;
      background: var(--bg-void);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      transition: opacity 0.4s ease;
    }

    .player-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
      position: absolute;
      inset: 0;
    }

    .player-placeholder-content {
      position: relative;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .play-btn-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(var(--neon-cyan-rgb), 0.2);
      border: 2px solid var(--neon-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neon-cyan);
      font-size: 2.5rem;
      box-shadow: 0 0 20px rgba(var(--neon-cyan-rgb), 0.4);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .player-placeholder:hover .play-btn-large {
      transform: scale(1.1);
      background: rgba(var(--neon-cyan-rgb), 0.4);
    }

    .player-placeholder-text {
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
    }
    
    .metadata {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .metadata__header {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .metadata__title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      color: #fff;
      text-shadow: 0 0 10px rgba(var(--neon-cyan-rgb), 0.4);
    }
    
    .metadata__info {
      font-family: var(--font-mono);
      color: var(--text-muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .metadata__synopsis {
      color: var(--text-primary);
      line-height: 1.6;
      max-width: 800px;
      font-size: 1.1rem;
    }
    
    .selector-container {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(12, 12, 22, 0.6);
      border: 1px solid rgba(var(--neon-purple-rgb), 0.3);
      display: none; /* Hidden by default, shown for series/anime */
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .selector-container {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }
      .neon-select {
        width: 100%;
      }
    }
    
    .selector-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .selector-group label {
      font-family: var(--font-mono);
      color: var(--neon-purple);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    
    .neon-select {
      background: var(--bg-void);
      color: var(--text-primary);
      border: 1px solid rgba(var(--neon-purple-rgb), 0.5);
      padding: 0.5rem 1rem;
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      min-width: 150px;
    }
    
    .neon-select:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(var(--neon-cyan-rgb), 0.3);
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body>

  <!-- Atmospheric layers -->
  <canvas id="rain-canvas" aria-hidden="true"></canvas>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar__logo">
      <img src="assets/logo.png" alt="NeonLatino" id="nav-logo">
    </a>

    <div class="navbar__nav" id="nav-links">
      <a href="/" class="navbar__link">Inicio</a>
      <a href="catalogo.html?type=movies" class="navbar__link">Películas</a>
      <a href="catalogo.html?type=series" class="navbar__link">Series</a>
      <a href="catalogo.html?type=anime" class="navbar__link">Anime</a>
      
      <div class="navbar__search">
        <span class="navbar__search-icon">⌕</span>
        <input type="text" class="navbar__search-input" placeholder="Buscar título..." id="search-input" autocomplete="off">
      </div>
    </div>

    <button class="navbar__hamburger" id="hamburger-btn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Watch Content -->
  <div class="watch-container reveal">
    <div class="player-wrapper">
      <div class="player-placeholder" id="player-placeholder">
        <img id="player-backdrop" src="" alt="">
        <div class="player-placeholder-content">
          <div class="play-btn-large">▶</div>
          <span class="player-placeholder-text">Click para reproducir</span>
        </div>
      </div>
      <iframe id="video-player" src="" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>
    
    <!-- Season/Episode Selectors -->
    <div class="selector-container reveal" id="season-episode-selector">
      <div class="selector-group">
        <label for="season-select">Temporada</label>
        <select id="season-select" class="neon-select">
          <!-- Options will be populated by JS -->
        </select>
      </div>
      <div class="selector-group">
        <label for="episode-select">Episodio</label>
        <select id="episode-select" class="neon-select">
          <!-- Options will be populated by JS -->
        </select>
      </div>
    </div>
    
    <div class="metadata reveal">
      <div class="metadata__header">
        <h1 class="metadata__title" id="media-title">Cargando...</h1>
        <div class="metadata__info">
          <span id="media-year">----</span>
          <span id="media-rating" style="color: var(--neon-amber)">★ --</span>
          <span id="media-genres">Géneros</span>
        </div>
      </div>
      <p class="metadata__synopsis" id="media-synopsis">Cargando sinopsis...</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <img src="assets/logo.png" alt="NeonLatino" class="footer__logo">
      <p class="footer__text">© 2026 NEONLATINO — TODOS LOS DERECHOS RESERVADOS</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/search.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/ver.js"></script>
</body>
</html>
