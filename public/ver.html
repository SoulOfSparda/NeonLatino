<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor — NeonLatino</title>
  <meta name="description" content="Reproductor de NeonLatino">
  <meta name="theme-color" content="#06060c">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    .watch-layout {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 0;
      padding-top: var(--nav-height);
      min-height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
    }

    .watch-main {
      padding: 2rem var(--content-padding) 4rem;
    }

    .player-wrapper {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-elevated);
      border: 1px solid rgba(var(--neon-cyan-rgb), 0.2);
      box-shadow: 0 0 30px rgba(var(--neon-cyan-rgb), 0.1);
      position: relative;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    
    .player-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      inset: 0;
    }

    /* Episode navigation buttons below player */
    .episode-nav {
      display: none;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: rgba(12, 12, 22, 0.6);
      border: 1px solid rgba(var(--neon-purple-rgb), 0.2);
    }

    .episode-nav.active { display: flex; }

    .episode-nav__btn {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 1.2rem;
      border: 1px solid rgba(var(--neon-cyan-rgb), 0.4);
      color: var(--neon-cyan);
      transition: all 0.3s ease;
      min-height: 44px;
    }

    .episode-nav__btn:hover:not(:disabled) {
      background: rgba(var(--neon-cyan-rgb), 0.1);
      box-shadow: 0 0 10px rgba(var(--neon-cyan-rgb), 0.3);
    }

    .episode-nav__btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .episode-nav__current {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    
    .metadata {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .metadata__title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      color: #fff;
      text-shadow: 0 0 10px rgba(var(--neon-cyan-rgb), 0.4);
    }
    
    .metadata__info {
      font-family: var(--font-mono);
      color: var(--text-muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.85rem;
    }
    
    .metadata__synopsis {
      color: var(--text-primary);
      line-height: 1.6;
      max-width: 800px;
      font-size: 1rem;
    }

    /* --- Episode Sidebar --- */
    .episode-sidebar {
      display: none;
      position: sticky;
      top: var(--nav-height);
      height: calc(100vh - var(--nav-height));
      background: rgba(10, 10, 18, 0.95);
      border-left: 1px solid rgba(var(--neon-purple-rgb), 0.2);
      flex-direction: column;
      overflow: hidden;
    }

    .episode-sidebar.active { display: flex; }

    .episode-sidebar__header {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid rgba(var(--neon-purple-rgb), 0.2);
      flex-shrink: 0;
    }

    .episode-sidebar__header label {
      font-family: var(--font-mono);
      color: var(--neon-purple);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.5rem;
    }

    .neon-select {
      background: var(--bg-void);
      color: var(--text-primary);
      border: 1px solid rgba(var(--neon-purple-rgb), 0.5);
      padding: 0.5rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }

    .neon-select:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(var(--neon-cyan-rgb), 0.3);
    }

    .episode-sidebar__list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .episode-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
      border-left: 3px solid transparent;
    }

    .episode-item:hover {
      background: rgba(var(--neon-cyan-rgb), 0.05);
    }

    .episode-item--active {
      background: rgba(var(--neon-cyan-rgb), 0.08);
      border-left-color: var(--neon-cyan);
    }

    .episode-item__number {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      min-width: 2rem;
    }

    .episode-item--active .episode-item__number {
      color: var(--neon-cyan);
    }

    .episode-item__title {
      font-size: 0.85rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .episode-item--active .episode-item__title {
      color: var(--neon-cyan);
    }

    /* --- Mobile layout --- */
    @media (max-width: 1024px) {
      .watch-layout {
        grid-template-columns: 1fr;
      }

      .watch-main {
        padding: 1rem var(--content-padding) 2rem;
      }

      .player-wrapper {
        margin-left: calc(-1 * var(--content-padding));
        margin-right: calc(-1 * var(--content-padding));
        width: calc(100% + 2 * var(--content-padding));
        border-inline: none;
      }

      .episode-sidebar {
        position: static;
        height: auto;
        max-height: 50vh;
        border-left: none;
        border-top: 1px solid rgba(var(--neon-purple-rgb), 0.2);
        margin: 0 var(--content-padding) 1.5rem;
      }
    }

    @media (max-width: 768px) {
      .episode-nav__btn {
        font-size: 0.6rem;
        padding: 0.5rem 0.8rem;
      }
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body>

  <!-- Atmospheric layers -->
  <canvas id="rain-canvas" aria-hidden="true"></canvas>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar__logo">
      <img src="assets/logo.png" alt="NeonLatino" id="nav-logo">
    </a>

    <div class="navbar__nav" id="nav-links">
      <a href="/" class="navbar__link">Inicio</a>
      <a href="catalogo.html?type=movies" class="navbar__link">Películas</a>
      <a href="catalogo.html?type=series" class="navbar__link">Series</a>
      <a href="catalogo.html?type=anime" class="navbar__link">Anime</a>
      
      <div class="navbar__search">
        <span class="navbar__search-icon">⌕</span>
        <input type="text" class="navbar__search-input" placeholder="Buscar título..." id="search-input" autocomplete="off">
      </div>
    </div>

    <button class="navbar__hamburger" id="hamburger-btn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>

    <button class="navbar__search-toggle" id="search-toggle-btn" aria-label="Buscar">⌕</button>

    <!-- Mobile search overlay -->
    <div class="search-overlay" id="search-overlay">
      <div class="search-overlay__inner">
        <input type="text" class="search-overlay__input" id="search-input-mobile" placeholder="Buscar título..." autocomplete="off">
        <button class="search-overlay__close" id="search-overlay-close" aria-label="Cerrar">✕</button>
      </div>
    </div>
  </nav>

  <!-- Watch Content -->
  <div class="watch-layout">
    <div class="watch-main">
      <div class="player-wrapper">
        <iframe id="video-player" src="" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      </div>

      <!-- Episode Navigation Buttons -->
      <div class="episode-nav" id="episode-nav">
        <button class="episode-nav__btn" id="btn-prev-ep">← ANTERIOR</button>
        <span class="episode-nav__current" id="ep-current-label">Ep 1</span>
        <button class="episode-nav__btn" id="btn-next-ep">SIGUIENTE →</button>
      </div>

      <div class="metadata">
        <h1 class="metadata__title" id="media-title">Cargando...</h1>
        <div class="metadata__info">
          <span id="media-year">----</span>
          <span id="media-rating" style="color: var(--neon-amber)">★ --</span>
          <span id="media-genres">Géneros</span>
        </div>
        <p class="metadata__synopsis" id="media-synopsis">Cargando sinopsis...</p>
      </div>
    </div>

    <!-- Episode Sidebar -->
    <aside class="episode-sidebar" id="episode-sidebar">
      <div class="episode-sidebar__header">
        <label for="season-select">Temporada</label>
        <select id="season-select" class="neon-select"></select>
      </div>
      <div class="episode-sidebar__list" id="episode-list">
        <!-- Episode items injected by JS -->
      </div>
    </aside>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <img src="assets/logo.png" alt="NeonLatino" class="footer__logo">
      <p class="footer__text">© 2026 NEONLATINO — TODOS LOS DERECHOS RESERVADOS</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/search.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/ver.js"></script>
</body>
</html>
