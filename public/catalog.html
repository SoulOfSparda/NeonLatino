<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — NeonLatino</title>
  <meta name="description" content="Catálogo completo de NeonLatino">
  <meta name="theme-color" content="#06060c">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    /* Specific styles for Catalog page */
    .catalog-container {
      padding: calc(var(--nav-height) + 2rem) var(--content-padding) 4rem;
      max-width: 1600px;
      margin: 0 auto;
      min-height: 100vh;
    }
    
    .catalog-header {
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(var(--neon-cyan-rgb), 0.2);
      padding-bottom: 1rem;
    }
    
    .catalog-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(var(--neon-cyan-rgb), 0.4);
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    /* Override card size for grid */
    .catalog-grid .card {
      width: 100%;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      font-family: var(--font-mono);
    }
    
    .pagination-info {
      color: var(--text-muted);
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- Atmospheric layers -->
  <canvas id="rain-canvas" aria-hidden="true"></canvas>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar__logo">
      <img src="assets/logo.png" alt="NeonLatino" id="nav-logo">
    </a>

    <div class="navbar__nav" id="nav-links">
      <a href="/" class="navbar__link">Inicio</a>
      <a href="catalog.html?type=movies" class="navbar__link" id="nav-movies">Películas</a>
      <a href="catalog.html?type=series" class="navbar__link" id="nav-series">Series</a>
      <a href="catalog.html?type=anime" class="navbar__link" id="nav-anime">Anime</a>
    </div>

    <button class="navbar__hamburger" id="hamburger-btn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Catalog Content -->
  <div class="catalog-container reveal">
    <div class="catalog-header">
      <h1 class="catalog-title" id="catalog-title">Catálogo</h1>
    </div>
    
    <div class="catalog-grid reveal reveal--stagger" id="catalog-grid">
      <!-- Loading state -->
      <div style="grid-column: 1 / -1; text-align: center; color: var(--neon-cyan); padding: 4rem;">
        Cargando interfaz neural...
      </div>
    </div>
    
    <div class="pagination">
      <button class="btn btn--ghost" id="btn-prev" disabled>← ANTERIOR</button>
      <span class="pagination-info" id="page-info">Página 1</span>
      <button class="btn btn--ghost" id="btn-next" disabled>SIGUIENTE →</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <img src="assets/logo.png" alt="NeonLatino" class="footer__logo">
      <p class="footer__text">© 2026 NEONLATINO — TODOS LOS DERECHOS RESERVADOS</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
