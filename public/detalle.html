<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle — NeonLatino</title>
  <meta name="theme-color" content="#06060c">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <style>
    .detail-backdrop{position:relative;width:100%;height:70vh;min-height:400px;overflow:hidden}
    .detail-backdrop__img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .detail-backdrop__gradient{position:absolute;inset:0;background:linear-gradient(to top,var(--bg-void) 0%,transparent 50%),linear-gradient(to right,var(--bg-void) 0%,transparent 60%)}
    .detail-content{max-width:1400px;margin:-200px auto 0;position:relative;padding:0 var(--content-padding) 4rem;display:grid;grid-template-columns:220px 1fr;gap:2rem}
    .detail-poster{border:1px solid rgba(var(--neon-cyan-rgb),.3);box-shadow:0 0 20px rgba(var(--neon-cyan-rgb),.15);overflow:hidden;height:330px}
    .detail-poster img{width:100%;height:100%;object-fit:cover}
    .detail-meta{display:flex;flex-direction:column;gap:1rem}
    .detail-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,3rem);color:#fff;text-shadow:0 0 15px rgba(var(--neon-cyan-rgb),.4)}
    .detail-tags{display:flex;flex-wrap:wrap;gap:.5rem;font-family:var(--font-mono);font-size:.8rem;color:var(--text-muted)}
    .detail-tags span{padding:.25rem .6rem;border:1px solid rgba(var(--neon-cyan-rgb),.2);background:rgba(var(--neon-cyan-rgb),.05)}
    .detail-rating{color:var(--neon-amber);font-family:var(--font-mono);font-size:1rem}
    .detail-synopsis{color:var(--text-primary);line-height:1.7;max-width:700px;font-size:.95rem}
    .detail-actions{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem}
    .detail-section{max-width:1400px;margin:0 auto;padding:2rem var(--content-padding)}
    .detail-section__title{font-family:var(--font-display);font-size:1.1rem;color:var(--neon-cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;border-bottom:1px solid rgba(var(--neon-cyan-rgb),.2);padding-bottom:.5rem}
    .cast-grid{display:flex;gap:1rem;overflow-x:auto;padding-bottom:.5rem}
    .cast-card{flex-shrink:0;width:100px;text-align:center}
    .cast-card img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid rgba(var(--neon-purple-rgb),.4)}
    .cast-card__name{font-size:.75rem;color:var(--text-primary);margin-top:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cast-card__char{font-size:.65rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .trailer-wrapper{width:100%;max-width:800px;aspect-ratio:16/9;margin-bottom:1rem}
    .trailer-wrapper iframe{width:100%;height:100%;border:none}
    .seasons-list{display:flex;flex-direction:column;gap:.75rem}
    .season-item{padding:.75rem 1rem;border:1px solid rgba(var(--neon-purple-rgb),.2);background:rgba(var(--neon-purple-rgb),.05);cursor:pointer;transition:all .2s}
    .season-item:hover{border-color:var(--neon-cyan);background:rgba(var(--neon-cyan-rgb),.05)}
    .season-item__name{font-family:var(--font-display);font-size:.85rem;color:var(--neon-purple)}
    .season-item__info{font-size:.8rem;color:var(--text-muted);margin-top:.25rem}
    .similar-row{display:flex;gap:1rem;overflow-x:auto;padding-bottom:.5rem}
    .similar-row .card{flex-shrink:0;width:150px}
    @media(max-width:768px){
      .detail-content{grid-template-columns:1fr;margin-top:-120px}
      .detail-poster{width:150px;height:225px;margin:0 auto}
      .detail-meta{text-align:center;align-items:center}
      .detail-backdrop{height:50vh;min-height:280px}
    }
  </style>
</head>
<body>
  <canvas id="rain-canvas" aria-hidden="true"></canvas>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <nav class="navbar" id="navbar">
    <a href="/" class="navbar__logo"><img src="assets/logo.png" alt="NeonLatino" id="nav-logo"></a>
    <div class="navbar__nav" id="nav-links">
      <a href="/" class="navbar__link">Inicio</a>
      <a href="catalogo.html?type=movies" class="navbar__link">Películas</a>
      <a href="catalogo.html?type=series" class="navbar__link">Series</a>
      <a href="catalogo.html?type=anime" class="navbar__link">Anime</a>
      <div class="navbar__search">
        <span class="navbar__search-icon">⌕</span>
        <input type="text" class="navbar__search-input" placeholder="Buscar título..." id="search-input" autocomplete="off">
      </div>
    </div>
    <button class="navbar__hamburger" id="hamburger-btn" aria-label="Menú"><span></span><span></span><span></span></button>
    <button class="navbar__search-toggle" id="search-toggle-btn" aria-label="Buscar">⌕</button>
    <div class="search-overlay" id="search-overlay">
      <div class="search-overlay__inner">
        <input type="text" class="search-overlay__input" id="search-input-mobile" placeholder="Buscar título..." autocomplete="off">
        <button class="search-overlay__close" id="search-overlay-close" aria-label="Cerrar">✕</button>
      </div>
    </div>
  </nav>

  <div class="detail-backdrop" id="detail-backdrop">
    <div class="detail-backdrop__gradient"></div>
  </div>

  <div class="detail-content">
    <div class="detail-poster" id="detail-poster"></div>
    <div class="detail-meta">
      <h1 class="detail-title" id="detail-title">Cargando...</h1>
      <div class="detail-rating" id="detail-rating"></div>
      <div class="detail-tags" id="detail-tags"></div>
      <p class="detail-synopsis" id="detail-synopsis"></p>
      <div class="detail-actions" id="detail-actions"></div>
    </div>
  </div>

  <div id="trailer-section" class="detail-section" style="display:none">
    <h2 class="detail-section__title">Trailer</h2>
    <div class="trailer-wrapper" id="trailer-wrapper"></div>
  </div>

  <div id="cast-section" class="detail-section" style="display:none">
    <h2 class="detail-section__title">Reparto</h2>
    <div class="cast-grid" id="cast-grid"></div>
  </div>

  <div id="seasons-section" class="detail-section" style="display:none">
    <h2 class="detail-section__title">Temporadas</h2>
    <div class="seasons-list" id="seasons-list"></div>
  </div>

  <div id="similar-section" class="detail-section" style="display:none">
    <h2 class="detail-section__title">Contenido Similar</h2>
    <div class="similar-row" id="similar-row"></div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <img src="assets/logo.png" alt="NeonLatino" class="footer__logo">
      <p class="footer__text">© 2026 NEONLATINO — TODOS LOS DERECHOS RESERVADOS</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/search.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/detalle.js"></script>
</body>
</html>
